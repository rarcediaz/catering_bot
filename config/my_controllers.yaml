controller_manager:
  ros__parameters:
    update_rate: 30

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:
    publish_rate: 50.0
    base_frame_id: base_link
    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']
    wheel_separation: 0.4064
    wheel_radius: 0.0762
    use_stamped_vel: false
    open_loop: false
    enable_odom_tf: true
    cmd_vel_timeout: 0.25
    publish_limited_velocity: true
    velocity_rolling_window_size: 5
    pose_covariance_diagonal: [0.01, 0.01, 0.001, 0.001, 0.001, 0.05]
    twist_covariance_diagonal: [0.01, 0.01, 0.001, 0.001, 0.001, 0.05]

    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 0.08
    linear.x.min_velocity: -0.08
    linear.x.max_acceleration: 0.06
    linear.x.min_acceleration: -0.08
    linear.x.max_jerk: 0.0
    linear.x.min_jerk: 0.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 0.12
    angular.z.min_velocity: -0.12
    angular.z.max_acceleration: 0.10
    angular.z.min_acceleration: -0.10
    angular.z.max_jerk: 0.0
    angular.z.min_jerk: 0.0