joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.09
    autorepeat_rate: 20.0

teleop_node:
  ros__parameters:

    # Information for TwistStamped header
    publish_stamped_twist: false

    # Axis mappings
    axis_linear:  # Left thumb stick vertical
      x: 0.2
    scale_linear:
      x: 0.5
    scale_linear_turbo:
      x: 0.8

    axis_angular:  # Left thumb stick horizontal
      yaw: 0
    scale_angular:
      yaw: 0.2
    scale_angular_turbo:
      yaw: 0.4

    # Button Mappings
    require_enable_button: true
    enable_button: 4  # Left shoulder button
    enable_turbo_button: 5  # Right shoulder button